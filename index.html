<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EVAI</title>

<style>
@font-face {
  font-family: "Synonym";
  src: url("fonts/Synonym-Regular.otf") format("opentype");
}
@font-face {
  font-family: "Alpino";
  src: url("fonts/Alpino-Medium.otf") format("opentype");
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  background: #eaf2fb;
  color: #0b1f33;
  font-family: "Synonym", sans-serif;
}

/* LANDING PAGE */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  padding: 28px 18px 18px;
  gap: 24px;
}

.landing-main {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: auto 0;
}

/* LOGO */
.landing-logo {
  width: min(78vw, 320px);
  height: auto;
  margin-bottom: 18px;
  display: block;
}

/* HEADLINE */
.landing h1 {
  font-family: "Alpino", serif;
  font-size: clamp(28px, 5vw, 46px);
  line-height: 1.08;
  margin-bottom: 14px;
  max-width: 12ch;
}

/* TAGLINE */
.tagline {
  font-size: clamp(13px, 2.8vw, 17px);
  line-height: 1.5;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* ACCESS INPUT */
.access-input {
  padding: 14px 18px;
  font-size: 15px;
  border: 1px solid #6f96bb;
  border-radius: 10px;
  background: transparent;
  text-align: center;
  width: 100%;
  max-width: 320px;
  color: #0b1f33;
  outline: none;
}

.access-input::placeholder {
  color: #8a8f96;
  letter-spacing: 0.04em;
}

/* FOOTER */
footer {
  font-size: 13px;
  line-height: 1.5;
  color: #0b1f33;
  max-width: 500px;
}

footer a {
  color: #0b1f33;
  text-decoration: none;
  margin: 0 4px;
}

footer a:hover {
  text-decoration: underline;
}

/* MOBILE */
/* =========================
   DESKTOP LAYOUT
   ========================= */

@media (min-width: 1024px) {

  .landing {
    padding: 60px 40px 40px;
  }

  .landing-main {
    max-width: 1100px;
    width: 100%;
  }

  .landing-logo {
    width: 280px;
    margin-bottom: 40px;
  }

  .landing h1 {
    font-size: 56px;
    line-height: 1.05;
    max-width: 900px;
  }

  .tagline {
    font-size: 18px;
    letter-spacing: 0.18em;
    margin-bottom: 40px;
  }

  .access-input {
    width: 420px;
    font-size: 16px;
    padding: 16px 20px;
  }

  footer {
    font-size: 14px;
  }

}
</style>
</head>

<body>

<div class="landing">

  <div class="landing-main">

    <img src="evai.svg" alt="EVAI" class="landing-logo" />

    <h1>Enterprise Vehicle Architecture Intelligence</h1>

    <div class="tagline">
      Translation Layers · Phased Reveal · Active Alignment
    </div>

    <input
      type="password"
      class="access-input"
      id="codeInput"
      placeholder="ACCESS CODE"
      onkeydown="if(event.key==='Enter') unlock()"
    />

  </div>

  <footer>
    © 2025 Enterprise Vehicle Architecture Intelligence (EVAI) ·
    <a href="https://fleetai.network" target="_blank">fleetai.network</a> ·
    <a href="https://evai.us" target="_blank">evai.us</a>
  </footer>

</div>

<script>
function unlock() {
  if (document.getElementById("codeInput").value === "NOF9310") {
    window.location.href = "access.html";
  }
}
</script>

</body>
</html>
