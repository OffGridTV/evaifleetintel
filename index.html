<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
      font-display: swap;
    }

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
      font-display: swap;
    }

    :root {
      --bg: #eaf2fb;
      --text: #0b1f33;
      --border: #7ea0c3;
      --muted: #8f949b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Synonym", sans-serif;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 18px 16px 16px;
      overflow-x: hidden;
    }

    .hero {
      width: 100%;
      max-width: 1400px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(70vw, 300px);
      height: auto;
      margin: 0 auto 14px;
    }

    h1 {
      font-family: "Alpino", serif;
      font-weight: 500;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      max-width: 11ch;
      margin: 0 auto 14px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .tagline {
      width: 100%;
      max-width: 340px;
      margin: 0 auto 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      white-space: normal;
    }

    .access-input {
      display: block;
      width: min(100%, 340px);
      height: 58px;
      margin: 0 auto;
      padding: 0 16px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      background: transparent;
      color: var(--text);
      text-align: center;
      font-size: 1rem;
      font-family: "Synonym", sans-serif;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .access-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    footer {
      width: 100%;
      max-width: 340px;
      margin: 18px auto 0;
      text-align: center;
      font-size: 0.84rem;
      line-height: 1.45;
    }

    footer a {
      color: var(--text);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* TABLET */
    @media (min-width: 768px) {
      .page {
        padding: 26px 24px 20px;
      }

      .logo {
        width: min(52vw, 420px);
        margin-bottom: 16px;
      }

      h1 {
        font-size: clamp(2.8rem, 5vw, 4.3rem);
        max-width: 15ch;
        margin-bottom: 16px;
      }

      .tagline {
        max-width: 800px;
        font-size: 1rem;
        letter-spacing: 0.14em;
        margin-bottom: 24px;
      }

      .access-input {
        width: min(100%, 420px);
        height: 60px;
        font-size: 1.05rem;
      }

      footer {
        max-width: 760px;
        font-size: 0.95rem;
      }
    }

    /* LAPTOP / DESKTOP */
    @media (min-width: 1024px) {
      .page {
        padding: 10px 40px 24px;
      }

      .hero {
        transform: translateY(-22px);
      }

      .logo {
        width: min(42vw, 520px);
        margin-bottom: 8px;
      }

      h1 {
        font-size: clamp(3.3rem, 4.1vw, 5.4rem);
        max-width: none;
        white-space: nowrap;
        margin-bottom: 18px;
      }

      .tagline {
        max-width: none;
        white-space: nowrap;
        font-size: clamp(1rem, 1.1vw, 1.25rem);
        letter-spacing: 0.18em;
        margin-bottom: 28px;
      }

      .access-input {
        width: 540px;
        height: 64px;
        font-size: 1.08rem;
        border-radius: 18px;
      }

      footer {
        max-width: none;
        white-space: nowrap;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="hero">
      <img src="evai.svg" alt="EVAI" class="logo" />

      <h1>Environmental Variance Intelligence</h1>

      <div class="tagline">
        Measured Variance · System Context · Risk Translation
      </div>

      <input
        type="password"
        class="access-input"
        id="codeInput"
        placeholder="ACCESS CODE"
        onkeydown="if(event.key === 'Enter') unlock()"
      />
    </main>

    <footer>
      © 2025 Environmental Variance Intelligence (EVAI) ·
      <a href="https://fleetai.network" target="_blank" rel="noopener noreferrer">fleetai.network</a>
      ·
      <a href="https://evai.us" target="_blank" rel="noopener noreferrer">evai.us</a>
    </footer>
  </div>

  <script>
    function unlock() {
      if (document.getElementById("codeInput").value === "NOF9310") {
        window.location.href = "access.html";
      }
    }
  </script>
</body>
</html>
