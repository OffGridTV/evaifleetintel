<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
    }

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #d6e6fb 0%, #e7f0ff 100%);
      font-family: "Synonym", sans-serif;
      color: #0a1a2f;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 110px 20px 60px;
      text-align: center;
    }

    .logo {
      width: clamp(180px, 20vw, 240px);
      margin-bottom: 34px;
    }

    h1 {
      font-family: "Alpino", serif;
      font-size: clamp(22px, 2.3vw, 28px);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .sub {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 36px;
    }

    .signal {
      max-width: 600px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .signal strong {
      font-weight: 600;
    }

  </style>
</head>

<body>
  <div class="wrap">

    <img src="evai.svg" class="logo" />

    <h1>System variance analysis and risk interpretation</h1>

    <div class="sub">
      Measured variance · system context · risk prioritization
    </div>

    <div class="signal">
      <strong>Signal:</strong> Repeated DNS requests to an unfamiliar domain originating from a single host.
      Pattern suggests automated activity requiring investigation and escalation.
    </div>

  </div>
</body>
</html>
