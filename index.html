<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
}

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
}

 .body {
  margin: 0;
  min-height: 100vh;

  /* keep centered but control vertical space */
  display: flex;
  align-items: center;
  justify-content: center;

  /* stronger blue */
  background: #d7e4f5;

  text-align: center;
}

.wrap {
  width: 100%;
  max-width: 900px;

  /* THIS is the key fix */
  padding-top: 60px;
  padding-bottom: 40px;
}

.logo {
  /* tighten space below logo */
  margin-bottom: 60px;
}

h1 {
  /* bring headline closer to logo */
  margin-bottom: 14px;
}

.sub {
  margin-top: 6px;
}
  </style>
</head>

<body>
  <div class="wrap">

    <img src="evai.svg" class="logo" />

    <h1>Environmental Variance Analysis</h1>

    <div class="sub">
      Intelligence · Context · Quantified 
    </div>

  </div>
</body>
</html>
