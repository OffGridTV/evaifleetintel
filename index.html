<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
    }

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
    }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #e3edfb;
  font-family: "Synonym", sans-serif;
  color: #0b1f33;
  text-align: center;
  
    }

    .wrap {
      max-width: 620px;
      padding: 20px;
    }

    .logo {
      width: clamp(180px, 22vw, 260px);
      margin-bottom: 28px;
    }

    h1 {
      font-family: "Alpino", serif;
      font-weight: 500;
      font-size: clamp(20px, 2.2vw, 26px);
      margin-bottom: 10px;
    }

    .sub {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 36px;
    }

    .signal {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .signal strong {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img src="evai.svg" class="logo" />

    <h1>System variance analysis and risk interpretation</h1>

    <div class="sub">
      Measured variance · system context · risk prioritization
    </div>

    <div class="signal">
      <strong>Signal:</strong> Repeated DNS requests to an unfamiliar domain originating from a single host.  
      Pattern suggests automated activity requiring investigation and escalation.
    </div>

  </div>
</body>
</html>
