<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
    }

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #cfe0f8 0%, #e3ecfb 100%);
      font-family: "Synonym", sans-serif;
      color: #0a1a2f;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      padding: 0 20px;
    }

    .logo {
      width: clamp(420px, 60vw, 700px);
      margin-bottom: 40px;
    }

    h1 {
      font-family: "Alpino", serif;
      font-size: clamp(24px, 2.5vw, 34px);
      font-weight: 500;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.65;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img src="evai.svg" class="logo" />

    <h1>System variance analysis and risk interpretation</h1>

    <div class="sub">
      Measured variance · system context · risk prioritization
    </div>

  </div>
</body>
</html>
