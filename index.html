<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>EVAI</title>

  <style>
    @font-face {
      font-family: "Synonym";
      src: url("fonts/Synonym-Regular.otf") format("opentype");
      font-display: swap;
    }

    @font-face {
      font-family: "Alpino";
      src: url("fonts/Alpino-Medium.otf") format("opentype");
      font-display: swap;
    }

    :root {
      --bg: #eaf2fb;
      --text: #0b1f33;
      --border: #7ea0c3;
      --muted: #8d9299;
      --content-max: 1400px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      min-width: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Synonym", sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      padding: 24px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .hero {
      flex: 1;
      width: 100%;
      max-width: var(--content-max);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
    }

    .logo {
      width: min(78vw, 520px);
      height: auto;
      display: block;
      margin-bottom: 10px;
    }

    h1 {
      font-family: "Alpino", serif;
      font-weight: 500;
      font-size: clamp(2rem, 6vw, 4.6rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 16ch;
      text-wrap: balance;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.55rem);
      line-height: 1.45;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      max-width: 100%;
      word-break: normal;
    }

    .access-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .access-input {
      width: min(100%, 420px);
      height: 60px;
      padding: 0 18px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      text-align: center;
      font-size: 1.05rem;
      font-family: "Synonym", sans-serif;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .access-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    footer {
      width: 100%;
      max-width: var(--content-max);
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text);
    }

    footer .footer-line {
      display: inline-block;
      max-width: 100%;
    }

    footer a {
      color: var(--text);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Tablet */
    @media (min-width: 768px) {
      .page {
        padding: 34px 28px 24px;
      }

      .hero {
        gap: 22px;
      }

      .logo {
        width: min(50vw, 620px);
        margin-bottom: 6px;
      }

      h1 {
        max-width: 20ch;
      }

      .tagline {
        letter-spacing: 0.18em;
      }

      .access-input {
        width: min(100%, 460px);
        height: 64px;
        font-size: 1.1rem;
      }
    }

    /* Laptop / desktop */
    @media (min-width: 1024px) {
      .page {
        padding: 42px 40px 26px;
      }

      .hero {
        gap: 24px;
      }

      .logo {
        width: min(38vw, 760px);
        margin-bottom: 4px;
      }

      h1 {
        font-size: clamp(3.2rem, 4.1vw, 5.2rem);
        max-width: none;
        white-space: nowrap;
      }

      .tagline {
        font-size: clamp(1rem, 1.15vw, 1.3rem);
        white-space: nowrap;
      }

      .access-input {
        width: 440px;
      }

      footer .footer-line {
        white-space: nowrap;
      }
    }

    /* Smaller phones */
    @media (max-width: 480px) {
      .page {
        padding: 20px 14px 16px;
      }

      .hero {
        gap: 16px;
      }

      .logo {
        width: min(84vw, 420px);
      }

      h1 {
        font-size: clamp(1.9rem, 8vw, 2.5rem);
        max-width: 12ch;
      }

      .tagline {
        font-size: 0.92rem;
        letter-spacing: 0.11em;
        line-height: 1.5;
      }

      .access-input {
        height: 56px;
        border-radius: 12px;
        font-size: 1rem;
      }

      footer {
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="hero">
      <img src="evai.svg" alt="EVAI" class="logo" />

      <h1>Enterprise Vehicle Architecture Intelligence</h1>

      <div class="tagline">
        Translation Layers · Phased Reveal · Active Alignment
      </div>

      <div class="access-wrap">
        <input
          type="password"
          class="access-input"
          id="codeInput"
          placeholder="ACCESS CODE"
          onkeydown="if(event.key === 'Enter') unlock()"
        />
      </div>
    </main>

    <footer>
      <span class="footer-line">
        © 2025 Enterprise Vehicle Architecture Intelligence (EVAI) ·
        <a href="https://fleetai.network" target="_blank" rel="noopener noreferrer">fleetai.network</a>
        ·
        <a href="https://evai.us" target="_blank" rel="noopener noreferrer">evai.us</a>
      </span>
    </footer>
  </div>

  <script>
    function unlock() {
      const input = document.getElementById("codeInput");
      if (input.value === "NOF9310") {
        window.location.href = "access.html";
      }
    }
  </script>
</body>
</html>
